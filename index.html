<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ind. I.A.Col - Hub de Ingeniería</title>
    <style>
        /* Colores oficiales del tema oscuro de GitHub */
        body {
  <div class="navbar">
    <div style="font-weight: 600; color: #f0f6fc;">🤖 Ind. I.A.Col / Pioneer's Hub</div>
    <div>
        <a href="#" class="btn-github">Ingresar al Hub</a>
    </div>
</div>

<div class="container">
    <h1 style="font-size: 24px; margin-bottom: 8px;">🚀 Hub de Ingeniería Pioneer's</h1>
    <p style="color: #8b949e; margin-top: 0;">Portal oficial de investigación, desarrollo e innovación.</p>

    <div style="display: flex; border-bottom: 1px solid #30363d; margin-bottom: 24px;">
        <button class="tab active" onclick="switchTab('brochure')">🏠 Brochure</button>
        <button class="tab" onclick="switchTab('acceso')">🔐 Acceso</button>
        <button class="tab" onclick="switchTab('foro')">💬 Foro</button>
        <button class="tab" onclick="switchTab('idi')">🔬 I+D+i</button>
    </div>

    <div id="brochure" class="content-section">
        <h2>Ind. I.A.Col Comercial</h2>
        <p>Aquí irá la presentación comercial y el portafolio de la empresa.</p>
    </div>

    <div id="acceso" class="content-section" style="display:none;">
        <h2>Portal de Ingreso</h2>
        <p>Área para miembros del Hub (Estilo Streaming).</p>
    </div>

    <div id="foro" class="content-section" style="display:none;">
        <h2>Foro de Ingenieros</h2>
        <p>Espacio de discusión técnica.</p>
    </div>

    <div id="idi" class="content-section" style="display:none;">
        <h2>Investigación, Desarrollo e Innovación</h2>
        <p>Proyectos científicos y tecnológicos en marcha.</p>
    </div>
</div>

<style>
    .tab {
        background: none;
        border: none;
        color: #c9d1d9;
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
    }
    .tab:hover {
        border-bottom: 2px solid #8b949e;
    }
    .tab.active {
        border-bottom: 2px solid #f78166; /* Color naranja clásico de pestaña activa en GitHub */
        color: #f0f6fc;
        font-weight: 600;
    }
</style>

<script>
    function switchTab(sectionId) {
        // Ocultar todas las secciones
        document.querySelectorAll('.content-section').forEach(sec => sec.style.display = 'none');
        // Quitar estado activo a los botones
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        
        // Mostrar la sección seleccionada
        document.getElementById(sectionId).style.display = 'block';
        // Activar el botón presionado
        event.currentTarget.classList.add('active');
    }
</script>
<body>

    <div class="navbar">
        <div style="font-weight: 600; color: #f0f6fc;">🤖 Ind. I.A.Col / Pioneer's Hub</div>
        <div>
            <a href="#" class="btn-github">Ingresar al Hub</a>
        </div>
    </div>

    <div class="container">
        <h1>🚀 Bienvenidos a la plataforma Pioneer's</h1>
        <p>El portal de ingeniería, investigación y desarrollo.</p>
    </div>

</body>
</html>
